name: release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux
            ext: ''
          - goos: windows
            goarch: amd64
            suffix: win
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: macos
            ext: ''
          - goos: darwin
            goarch: arm64
            suffix: macos-arm64
            ext: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p release
          VERSION=$(cat VERSION 2>/dev/null || echo dev)
          go build -ldflags "-s -w -X main.version=$VERSION" \
            -o release/{{name}}-${{ matrix.suffix }}${{ matrix.ext }} \
            ./cmd/{{name}}
      - uses: actions/upload-artifact@v4
        with:
          name: {{name}}-${{ matrix.suffix }}
          path: release/{{name}}-${{ matrix.suffix }}${{ matrix.ext }}
